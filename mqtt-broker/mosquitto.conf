# ECLIPSE MOSQUITTO CONFIGURATION

# 1. Network & Port Configurations
# Mendengarkan koneksi MQTT standar pada port 1883 untuk semua interface
listener 1883 0.0.0.0

# 2. Security & Authentication
# Mengizinkan akses masuk tanpa username/password (khusus fase pengembangan lokal)
# PENTING: Matikan (set ke false) dan gunakan password_file untuk produksi!
allow_anonymous true

# 3. Storage & Persistence Settings
# Mengaktifkan penyimpanan persisten untuk menyimpan status langganan dan pesan QoS 1/2
persistence true
persistence_file mosquitto.db

# Lokasi penyimpanan database persisten di dalam container/sistem lokal
persistence_location /mosquitto/data/

# 4. Logging & Debugging Configurations
# Menampilkan log ke output standar konsol (bagus untuk docker-compose logs)
log_dest stdout

# Menyimpan log tambahan ke dalam berkas berkala
log_dest file /mosquitto/log/mosquitto.log

# Jenis log yang ingin direkam (sangat berguna untuk debugging koneksi ESP32)
log_type error
log_type warning
log_type notice
log_type information

# 5. Connection Limits & Keep Alive
# Durasi maksimal antrean pesan keluar untuk client yang offline
max_queued_messages 100

# Pengaturan tambahan untuk websocket (opsional jika dashboard ingin langsung konek ke MQTT)
listener 9001 0.0.0.0
protocol websockets
